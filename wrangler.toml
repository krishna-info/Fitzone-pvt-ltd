name = "fitzone-web"
main = ".open-next/worker.js"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "fittzone"
database_id = "aa65feef-9e5d-4bc2-8a92-1306ea51111e"

# R2 Bucket binding
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "fitzone-bucket"
